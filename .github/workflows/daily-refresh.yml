name: Daily Data Refresh

on:
  schedule:
    - cron: "30 3 * * *"   # 3:30 AM UTC = 9:00 AM IST
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write   # ← add this

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create secrets file
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml << 'EOF'
          [google]
          credentials_json = '${{ secrets.GOOGLE_CREDENTIALS }}'
          token_json = '${{ secrets.GOOGLE_TOKEN }}'
          EOF
      
      - name: Run data refresh
        run: |
          python -c "from src.parser import parse_all_statements; BASE_DIR = Path(__file__).resolve().parent.parent.parent; STATEMENTS_DIR = BASE_DIR / "data" / "statements"; df = parse_all_statements(STATEMENTS_DIR); print(f'✅ Refreshed {len(df)} transactions')"
      
      - name: Commit and push updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "__pycache__/" >> .gitignore
          echo "*.pyc" >> .gitignore
          git rm -r --cached .streamlit 2>/dev/null || true
          git rm -r --cached src/__pycache__ 2>/dev/null || true
          git add -A
          git commit -m "🔄 Daily data refresh - $(date)" || echo "No changes"
          git push
